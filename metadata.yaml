type: chromium

status:
  class: receiver
  stability:
    alpha: [ metrics ]
  distributions: [ contrib ]
  warnings: []
  codeowners:
    active: []

resource_attributes:

attributes:
  chromium.endpoint:
    description: Chrome DevTools Protocol WebSocket endpoint URL.
    type: string
  target.type:
    description: The type of the target (page, background_page, service_worker, browser, etc).
    type: string
  target.url:
    description: The URL of the browser target.
    type: string

metrics:
  chromium.page.document.count:
    description: Number of documents in the page.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: "{document}"
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.dom_node.count:
    description: Number of DOM nodes in the page.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: "{node}"
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.frame.count:
    description: Number of frames in the page.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: "{frame}"
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.js_event_listener.count:
    description: Number of JavaScript event listeners in the page.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: "{listener}"
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.js_heap.total_size:
    description: Total JavaScript heap size.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: By
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.js_heap.used_size:
    description: Used JavaScript heap size.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: By
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.layout.count:
    description: Cumulative count of full or partial page layouts.
    enabled: true
    stability: alpha
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    unit: "{layout}"
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.layout.duration:
    description: Cumulative duration of page layout operations.
    enabled: true
    stability: alpha
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    unit: s
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.recalc_style.count:
    description: Cumulative count of CSS style recalculations.
    enabled: true
    stability: alpha
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    unit: "{recalculation}"
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.recalc_style.duration:
    description: Cumulative duration of CSS style recalculations.
    enabled: true
    stability: alpha
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    unit: s
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.script.duration:
    description: Cumulative duration of JavaScript execution.
    enabled: true
    stability: alpha
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    unit: s
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.page.task.duration:
    description: Cumulative duration of all tasks.
    enabled: true
    stability: alpha
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    unit: s
    attributes: [ chromium.endpoint, target.type, target.url ]

  chromium.targets.count:
    description: Number of active browser targets.
    enabled: true
    stability: alpha
    gauge:
      value_type: int
    unit: "{target}"
    attributes: [ chromium.endpoint, target.type ]

tests:
  skip_lifecycle: true
  config:
    endpoint: ws://localhost:9222
  goleak:
    ignore:
      top:
        - "net/http.(*persistConn).readLoop"
        - "net/http.(*persistConn).writeLoop"
